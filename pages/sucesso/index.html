<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Aprovado - Eneida Feijó</title>

    <link rel="icon" type="image/png" href="../../assets/images/ui/logo.png">
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    
    <style>#footer-cta { display: none !important; }</style>
</head>

<body>
    <div id="app-banner"></div>
    <header class="main-header" id="app-header"></header>

    <main>
        <section class="section-common" style="padding: 5rem 0; text-align: center;">
            <div class="container">
                <div style="width: 80px; height: 80px; background-color: #2ecc71; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem auto; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>

                <h1 class="section-title">Pagamento Aprovado!</h1>
                <p class="section-subtitle">Sua inscrição para a <strong>3ª Tarde de Imersão</strong> foi confirmada com sucesso.</p>
                <p>Prepare-se para encontrar seu próprio ritmo, reconectar-se com o essencial e deixar ir tudo o que não te serve mais.</p>
                
                <div id="action-buttons" style="margin-top: 3rem; display: flex; justify-content: center; gap: 1.5rem; flex-wrap: wrap;">
                    <a href="../../index.html" class="btn-primary">Voltar ao Início</a>
                    </div>
            </div>
        </section>
    </main>

    <footer class="main-footer" id="app-footer"></footer>
    
    <script type="module" src="../../assets/js/main.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Analisa a URL da página (ex: .../sucesso/index.html?receipt_url=https://...)
            const urlParams = new URLSearchParams(window.location.search);
            const receiptUrl = urlParams.get('receipt_url');

            // Se a InfinitePay enviou um link de comprovante, criamos o botão dinamicamente
            if (receiptUrl) {
                const actionContainer = document.getElementById('action-buttons');
                
                const btnComprovante = document.createElement('a');
                btnComprovante.href = receiptUrl;
                btnComprovante.target = '_blank'; // Abre em nova aba
                btnComprovante.className = 'btn-secondary';
                btnComprovante.style.display = 'inline-flex';
                btnComprovante.style.alignItems = 'center';
                btnComprovante.style.gap = '8px';
                
                // Coloca um ícone de "documento" no botão
                btnComprovante.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    Ver Comprovante
                `;
                
                // Adiciona o botão do lado do "Voltar ao Início"
                actionContainer.appendChild(btnComprovante);
            }
        });
    </script>
</body>

</html>
